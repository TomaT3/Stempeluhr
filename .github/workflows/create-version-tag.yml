name: Create version tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "SemVer bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: version
        shell: bash
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | head -n 1)"
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi

          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"

          case "$BUMP" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump: $BUMP" >&2
              exit 1
              ;;
          esac

          next="$major.$minor.$patch"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Version tag created"
            echo ""
            echo "- Previous: ${{ steps.version.outputs.latest }}"
            echo "- Created: ${{ steps.version.outputs.tag }}"
            echo ""
            echo "The release container workflow will build the Docker image from this tag."
          } >> "$GITHUB_STEP_SUMMARY"
